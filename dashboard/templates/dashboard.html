<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poly CopyBot by Super Sauna Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060a;--bg2:#0c0c12;--bg3:#12121c;--bg4:#1a1a28;
  --border:#1e1e30;--border-h:#2e2e48;
  --gold:#c9a84c;--gold-bright:#e4c868;--gold-dim:rgba(201,168,76,0.2);
  --gold-glow:0 0 25px rgba(201,168,76,0.12),0 0 60px rgba(201,168,76,0.05);
  --green:#34d399;--green-dim:rgba(52,211,153,0.15);
  --red:#f87171;--red-dim:rgba(248,113,113,0.15);
  --text:#e8e4dc;--text-dim:#7a7890;--text-mid:#a09eb0;
  --font:'Manrope',system-ui,sans-serif;--mono:'Fira Code','Courier New',monospace;
}
html{font-size:15px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-weight:300;
  line-height:1.65;overflow-x:hidden;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ═══ ANIMATED BG ═══ */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    linear-gradient(rgba(201,168,76,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,168,76,0.03) 1px,transparent 1px);
  background-size:80px 80px;animation:gridDrift 60s linear infinite}
@keyframes gridDrift{to{background-position:80px 80px}}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 20% 0%,rgba(201,168,76,0.06),transparent 55%),
             radial-gradient(ellipse at 80% 100%,rgba(201,168,76,0.03),transparent 50%)}

/* ═══ SCANLINE ═══ */
.scan{position:fixed;top:0;left:0;right:0;height:1px;z-index:9998;pointer-events:none;
  background:linear-gradient(90deg,transparent 10%,rgba(201,168,76,0.25) 50%,transparent 90%);
  animation:scanMove 8s linear infinite}
@keyframes scanMove{0%{top:-1px}100%{top:100vh}}

/* ═══ LAYOUT ═══ */
.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 5% 40px}
.wide .app{max-width:none;padding:0 10px 8px;overflow-x:hidden}
html.wide,html.wide body{overflow-x:hidden!important;max-width:100vw}
.wide .sec{margin-bottom:0}
.wide .sec-hd{padding:4px 0}
.wide .tk-wrap{padding:3px 0;margin-bottom:10px}
.wide .hd{padding:4px 0;margin-bottom:4px}
/* Wide: ticker full width, then 2 columns */
.wide .hd{padding:2px 0;margin-bottom:0}
.wide .hd .logo{font-size:1rem}
.wide .hd .nav a{padding:4px 10px;font-size:.7rem}
.wide .tk-wrap{padding:3px 0;margin-bottom:10px}
.wide .wide-content{display:grid;grid-template-columns:1fr 300px;gap:8px;overflow:hidden}
/* Left: scrollable column */
.wide .wide-left{overflow-y:auto;overflow-x:hidden;padding-right:4px}
.wide .wide-left::-webkit-scrollbar{width:3px}
.wide .wide-left::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}
/* Top bar: cards left + chart right */
.wide .wide-topbar{display:grid;grid-template-columns:55fr 45fr;gap:10px;margin-bottom:8px;align-items:stretch;overflow:hidden}
.wide .wide-topbar .cards{grid-template-columns:repeat(5,1fr);gap:4px;margin:0}
.wide .wide-topbar .card{padding:10px 10px;text-align:center;display:flex;flex-direction:column;justify-content:center}
.wide .wide-topbar .card-val{font-size:1.35rem}
.wide .wide-topbar .card-lbl{font-size:.58rem;margin-bottom:3px}
.wide .wide-topbar .card-sub{font-size:.58rem}
.wide .wide-topbar .sec{margin:0;display:flex;flex-direction:column;overflow:hidden}
.wide .wide-topbar .sec-hd{padding:2px 0}
.wide .wide-topbar .chart-box{flex:1;min-height:0;overflow:hidden;position:relative;padding:8px}
.wide .wide-topbar .chart-box canvas{position:absolute;top:8px;left:8px;right:8px;bottom:8px;width:calc(100% - 16px)!important;height:calc(100% - 16px)!important}
.wide .wide-left .sec{margin-bottom:8px}
.wide .wide-left .tw{max-height:none;overflow-x:hidden}
.wide .tw table{table-layout:fixed;min-width:0!important}
.wide .tw th,.wide .tw td{font-size:.65rem;padding:4px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wide .wide-left .cli-panel{max-height:240px}
/* Log + Exposure side by side */
.wide .wide-log-row{display:grid;grid-template-columns:1fr 280px;gap:10px;margin-bottom:8px;align-items:stretch}
.wide .wide-log-row>.sec{margin:0;display:flex;flex-direction:column}
.wide .wide-log-row{grid-template-rows:1fr}
.wide .wide-log-row .cli-panel{max-height:none;flex:1;overflow-y:auto}
.wide .wide-log-row>.sec{max-height:310px}
.wide .expo-box{background:var(--bg2);border:1px solid var(--border);padding:14px 16px;flex:1;display:flex;flex-direction:column;justify-content:space-evenly}
.expo-row{display:flex;flex-direction:column;gap:4px;padding:6px 0;border-bottom:1px solid rgba(30,30,48,0.4)}
.expo-row:last-child{border-bottom:none}
.expo-top{display:flex;justify-content:space-between;align-items:baseline}
.expo-name{font-size:.78rem;font-weight:600;color:var(--gold);letter-spacing:.02em}
.expo-bar-bg{width:100%;height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;position:relative}
.expo-bar-fill{height:100%;border-radius:5px;transition:width .5s;box-shadow:0 0 6px rgba(0,0,0,0.3)}
.expo-pct{font-size:.68rem;color:var(--text-mid);font-family:var(--mono)}
/* Right: trader perf full height, sticky */
.wide .wide-right{overflow-y:auto;overflow-x:hidden;padding-left:4px;border-left:1px solid var(--border)}
.wide .wide-right::-webkit-scrollbar{width:3px}
.wide .wide-right::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}
.wide .wide-right .sec{margin:0}
.wide .wide-right .sec-hd{padding:4px 0}
.wide .wide-right #reportText{grid-template-columns:1fr!important;gap:4px!important}
.wide .wide-right .sec{overflow:hidden}
.wide .wide-right #reportText>div{padding:8px 10px!important;font-size:.7rem}
.wide .wide-right #reportText>div *{font-size:inherit!important}
.wide .wide-right #reportText>div>div:first-child{margin-bottom:4px!important}
.wide .wide-right #reportText>div>div:nth-child(2){padding:4px 0!important;margin-bottom:4px!important}
.wide .wide-right #reportText>div>div:nth-child(2)>div:first-child{font-size:.9rem!important}
.wide .wide-right #reportText>div>div:nth-child(3){gap:3px!important;font-size:.6rem!important}
.wide .wide-right #reportText>div>div:nth-child(3)>div{padding:3px 2px!important}

/* ═══ HEADER ═══ */
.hd{display:flex;align-items:center;justify-content:space-between;padding:12px 0;
  border-bottom:1px solid var(--border);margin-bottom:14px;flex-wrap:wrap;gap:12px}
.hd-left{display:flex;align-items:center;gap:8px}
.hd-center{display:flex;align-items:center;gap:16px;margin:0 auto}
.digiclock{display:none;font-family:var(--font);font-size:1.4rem;font-weight:300;letter-spacing:.12em;color:var(--gold);text-shadow:0 0 20px rgba(201,168,76,0.15)}
.wide .digiclock{display:block}
.status-tags{display:flex;gap:10px}
.st{font-size:.65rem;color:var(--text-dim);display:flex;align-items:center;gap:4px;letter-spacing:.06em}
.st-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim)}
.st-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.st-dot.off{background:var(--red);box-shadow:0 0 4px var(--red)}
.logo{font-size:1.25rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--gold);
  text-shadow:0 0 30px rgba(201,168,76,0.2)}
.live-tag{display:flex;align-items:center;gap:6px;font-size:.7rem;font-weight:600;letter-spacing:0.15em;color:var(--red)}
.live-dot{width:8px;height:8px;background:var(--red);border-radius:50%;animation:lp 1.4s ease-in-out infinite;
  box-shadow:0 0 8px rgba(248,113,113,0.5)}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.6)}}
.conn-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.conn-dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
.conn-dot.off{background:var(--red);box-shadow:0 0 6px var(--red)}
.hd-right{display:flex;align-items:center;gap:8px}
.nav a{font-size:.78rem;color:var(--text-mid);text-decoration:none;padding:8px 18px;
  border:1px solid transparent;letter-spacing:0.12em;text-transform:uppercase;font-weight:400;transition:all .25s}
.nav a:hover,.nav a.act{color:var(--gold);border-color:rgba(201,168,76,0.35)}
.sfx-btn{cursor:pointer;font-size:.75rem;color:var(--text-dim);display:flex;align-items:center;
  gap:5px;padding:8px 14px;border:1px solid var(--border);background:transparent;font-family:var(--font);
  transition:all .25s;letter-spacing:0.06em}
.sfx-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.sfx-btn.on{color:var(--green);border-color:var(--green-dim)}

/* ═══ TICKER ═══ */
.tk-wrap{overflow:hidden;border-bottom:1px solid var(--border);padding:8px 0;margin-bottom:14px;
  background:linear-gradient(90deg,var(--bg),var(--bg2),var(--bg))}
.tk{display:flex;gap:56px;white-space:nowrap;animation:tkScroll 40s linear infinite;width:max-content}
.tk:hover{animation-play-state:paused}
@keyframes tkScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tk-i{font-size:.88rem;color:var(--text-dim);display:flex;align-items:center;gap:8px;font-weight:300}
.tk-i .s{color:var(--gold);font-weight:600}.tk-i .up{color:var(--green)}.tk-i .dn{color:var(--red)}

/* ═══ METRIC CARDS ═══ */
.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);padding:22px 24px;position:relative;
  overflow:hidden;transition:all .3s}
.card:hover{border-color:var(--border-h);box-shadow:inset 0 0 40px rgba(201,168,76,0.02)}
.card.hero{border-color:rgba(201,168,76,0.25);background:linear-gradient(160deg,var(--bg2),#0f0e18)}
.card.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.card-lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-dim);
  font-weight:500;margin-bottom:10px}
.card-val{font-size:1.7rem;font-weight:700;font-family:var(--mono);letter-spacing:-0.5px;line-height:1.2}
.card-val.up{color:var(--green);text-shadow:0 0 20px rgba(52,211,153,0.15)}
.card-val.dn{color:var(--red);text-shadow:0 0 20px rgba(248,113,113,0.15)}
.card-val.neu{color:var(--text)}
.card-val.gld{color:var(--gold);text-shadow:var(--gold-glow)}
.card-sub{font-size:.75rem;color:var(--text-dim);margin-top:6px;font-weight:300}
.card-val-sm{font-size:1.1rem;font-weight:700;font-family:var(--mono);line-height:1.3}
.card-lbl-line{font-size:.58rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-dim);font-weight:500;margin-bottom:2px}

/* ═══ SECTIONS ═══ */
.sec{margin-bottom:18px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 0;
  border-bottom:none;margin-bottom:4px}
.sec-t{font-size:.82rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-mid)}
.sec-t .ct{color:var(--gold);margin-left:10px;font-family:var(--mono)}
.badge{font-size:.62rem;padding:5px 14px;letter-spacing:0.15em;font-weight:500;text-transform:uppercase;
  color:var(--green);border:1px solid var(--green-dim);animation:bPulse 2.5s infinite}
@keyframes bPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px var(--green-dim)}}

/* ═══ TABLES ═══ */
.tw{overflow-x:auto;max-height:460px;overflow-y:auto;border:1px solid var(--border);background:var(--bg2)}
.tw table{width:100%;table-layout:fixed}
.tw th,.tw td{padding:6px 8px;overflow:hidden;text-overflow:ellipsis}
.c-mkt2{width:34%}.c-side2{width:7%;text-align:left}.c-num{width:4%;text-align:right;white-space:nowrap}.c-pnl{width:6%;text-align:right;white-space:nowrap}.c-evt2{width:10%;white-space:nowrap;text-align:center}.c-time{width:4%;white-space:nowrap;color:var(--text-dim);font-size:.65rem;text-align:center}
.c-close{width:9%;text-align:center;white-space:nowrap}
.close-btn{display:inline-block;padding:4px 10px;border-radius:4px;font-size:.75rem;font-weight:700;cursor:pointer;border:none;min-width:70px;transition:opacity .2s}
.close-btn:hover{opacity:.8}
.close-btn.win{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.close-btn.loss{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3)}
tr.glow-win{background:rgba(52,211,153,.04)}
tr.glow-loss{background:rgba(248,113,113,.04)}
@keyframes rowPulseGreen{0%{background:rgba(52,211,153,.04)}30%{background:rgba(52,211,153,.15)}100%{background:rgba(52,211,153,.04)}}
@keyframes rowPulseRed{0%{background:rgba(248,113,113,.04)}30%{background:rgba(248,113,113,.15)}100%{background:rgba(248,113,113,.04)}}
tr.pulse-win{animation:rowPulseGreen 2s ease-out}
tr.pulse-loss{animation:rowPulseRed 2s ease-out}
.live-btn{display:inline-block;padding:3px 10px;border-radius:4px;font-size:.68rem;font-weight:700;cursor:pointer;border:1px solid rgba(248,113,113,.4);background:rgba(248,113,113,.1);color:var(--red);letter-spacing:.08em;transition:all .2s;animation:livePulse 2s infinite}
.live-btn:hover{background:rgba(248,113,113,.25);border-color:var(--red)}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.6}}
th.sort{cursor:pointer;user-select:none}th.sort:hover{color:var(--gold)}th.sort.asc::after{content:' ▲';font-size:.6em}th.sort.desc::after{content:' ▼';font-size:.6em}
.tw::-webkit-scrollbar{width:3px;height:3px}
.tw::-webkit-scrollbar-track{background:var(--bg)}
.tw::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:2}
th{background:var(--bg3);color:var(--text-dim);font-weight:500;text-transform:uppercase;
  letter-spacing:0.14em;font-size:.68rem;padding:8px 8px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:6px 8px;border-bottom:1px solid rgba(30,30,48,0.6);font-weight:300;font-size:.84rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr{transition:background .2s}
tr:hover{background:rgba(201,168,76,0.03)}
.p-up{color:var(--green)}.p-dn{color:var(--red)}
.side{font-weight:600;font-size:.72rem;padding:3px 9px;display:inline-block;letter-spacing:0.06em}
.side.yes{background:rgba(52,211,153,0.08);color:var(--green);border:1px solid rgba(52,211,153,0.2)}
.side.no{background:rgba(248,113,113,0.08);color:var(--red);border:1px solid rgba(248,113,113,0.2)}
.side.oth{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(201,168,76,0.25)}
.c-mkt a,.c-mkt2 a{color:var(--gold);text-decoration:none;transition:opacity .2s}
.c-mkt a:hover{opacity:.7}
.c-tr a{color:var(--text);text-decoration:none;font-weight:500}.c-tr a:hover{color:var(--gold)}
.c-id{color:var(--text-dim);font-family:var(--mono);font-size:.82rem}
.c-dt{color:var(--text-dim);font-size:.82rem}

/* ═══ CHART ═══ */
.chart-box{background:var(--bg2);border:1px solid var(--border);padding:20px;height:260px}
.cp-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:var(--font);
  font-size:.65rem;font-weight:600;letter-spacing:.1em;padding:4px 10px;cursor:pointer;transition:all .2s}
.cp-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.cp-btn.act{background:rgba(201,168,76,0.12);border-color:var(--gold);color:var(--gold)}

/* ═══ TRADER CARDS ═══ */
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.tc{background:var(--bg2);border:1px solid var(--border);padding:24px;transition:all .3s;position:relative}
.tc:hover{border-color:var(--gold-dim);transform:translateY(-2px);box-shadow:var(--gold-glow)}
.tc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.tc.win::before{background:var(--green)}.tc.lose::before{background:var(--red)}
.tc-name{font-size:1rem;font-weight:600;color:var(--gold);letter-spacing:0.06em;margin-bottom:14px}
.tc-name a{color:inherit;text-decoration:none}
.tc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.tc-s{font-size:.82rem;font-weight:300}.tc-s span{color:var(--text-dim)}
.tc-pnl{font-size:1.6rem;font-weight:700;font-family:var(--mono);margin-top:12px}
.tc-det{font-size:.78rem;color:var(--text-dim);margin-top:4px;font-weight:300}
.btn-s{font-size:.7rem;padding:7px 16px;border:1px solid var(--border);background:transparent;
  color:var(--text-dim);cursor:pointer;font-family:var(--font);letter-spacing:0.1em;
  text-transform:uppercase;transition:all .25s;margin-top:14px}
.btn-s:hover{border-color:rgba(248,113,113,0.4);color:var(--red)}

/* ═══ ALERT ═══ */
.al-ov{position:fixed;inset:0;z-index:9999;pointer-events:none;display:flex;
  align-items:flex-start;justify-content:center;padding-top:80px}
.al-ban{pointer-events:auto;background:var(--bg);border:1px solid var(--gold);padding:32px 52px;
  text-align:center;box-shadow:0 0 80px rgba(201,168,76,0.18),0 20px 60px rgba(0,0,0,0.7);
  animation:alIn .35s cubic-bezier(.17,.67,.35,1.2),alOut .5s 5.2s ease-in forwards;
  max-width:620px;width:92%;position:relative}
.al-ban.big-win{animation:alIn .35s cubic-bezier(.17,.67,.35,1.2),alOut .5s 15.5s ease-in forwards}
.al-ban.big-loss{animation:alIn .35s cubic-bezier(.17,.67,.35,1.2),shakeX .4s .35s ease-in-out,alOut .5s 5.5s ease-in forwards}
@keyframes shakeX{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-5px)}60%{transform:translateX(5px)}75%{transform:translateX(-2px)}90%{transform:translateX(2px)}}
.al-ban::before{content:'';position:absolute;inset:-1px;
  background:linear-gradient(45deg,var(--gold),transparent,var(--gold));opacity:.15;z-index:-1;
  animation:borderShift 3s linear infinite}
@keyframes borderShift{to{filter:hue-rotate(20deg)}}
@keyframes alIn{from{transform:translateY(-30px)scale(.95);opacity:0}to{transform:none;opacity:1}}
@keyframes alOut{to{transform:translateY(-15px);opacity:0}}
.al-lbl{font-size:.72rem;letter-spacing:0.35em;color:var(--gold);text-transform:uppercase;
  margin-bottom:10px;font-weight:600;animation:flk .1s 5}
@keyframes flk{0%,100%{opacity:1}50%{opacity:.15}}
.al-ttl{font-size:1.15rem;font-weight:600;color:var(--text);margin-bottom:6px}
.al-det{font-size:.88rem;color:var(--text-mid);font-weight:300}
.al-det .hl{color:var(--gold);font-weight:600}

/* ═══ BIG WIN JACKPOT ═══ */
#bigWinCanvas{position:fixed;inset:0;z-index:10001;pointer-events:none}
.bw-ov{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0);pointer-events:none;transition:background .6s ease}
.bw-ov.active{background:rgba(0,0,0,0.8);pointer-events:auto}
.bw-ov.fade-out{background:rgba(0,0,0,0);transition:background .8s ease}
.bw-card{text-align:center;transform:scale(0);opacity:0;transition:transform .5s cubic-bezier(.17,.67,.35,1.5),opacity .4s ease;
  position:relative;z-index:2}
.bw-ov.active .bw-card{transform:scale(1);opacity:1}
.bw-ov.fade-out .bw-card{transform:scale(0.8);opacity:0;transition:transform .6s ease,opacity .6s ease}
.bw-rays{position:absolute;width:600px;height:600px;left:50%;top:50%;margin:-300px 0 0 -300px;
  background:conic-gradient(from 0deg,transparent,rgba(201,168,76,0.1) 10%,transparent 20%);
  border-radius:50%;animation:bwSpin 8s linear infinite;z-index:1}
@keyframes bwSpin{to{transform:rotate(360deg)}}
.bw-title{font-size:3.2rem;font-weight:900;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--gold);text-shadow:0 0 40px rgba(201,168,76,0.6),0 0 80px rgba(201,168,76,0.3),

/* ═══ MEME GIF OVERLAY (bottom-right) ═══ */
.meme-ov{position:fixed;inset:0;z-index:9997;pointer-events:none;display:flex;
  align-items:flex-end;justify-content:flex-end;padding:0 32px 32px 0}
.meme-card{pointer-events:auto;background:var(--bg);border:1px solid var(--border-h);
  padding:14px 18px;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,0.7);
  animation:memeIn .35s cubic-bezier(.17,.67,.35,1.2);max-width:340px;text-align:center}
.meme-card.out{animation:memeOut .4s ease-in forwards}
.meme-card img{width:260px;border-radius:8px;margin-bottom:8px}
.meme-lbl{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;font-weight:700;
  color:var(--gold);margin-bottom:2px}
.meme-sub{font-size:.68rem;color:var(--text-dim);font-weight:300;font-style:italic}
@keyframes memeIn{from{transform:translateY(30px) scale(.95);opacity:0}to{transform:none;opacity:1}}
@keyframes memeOut{to{transform:translateY(15px);opacity:0}}

/* ═══ EMPTY ═══ */
.empty{text-align:center;padding:52px;color:var(--text-dim);font-size:1.05rem;font-weight:300;
  border:1px dashed var(--border);background:var(--bg2)}

/* ═══ FADE ═══ */
.fi{animation:fu .6s ease-out both}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}

.cl{display:flex;gap:0;padding:3px 16px;line-height:1.7;align-items:baseline;transition:background .15s}

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{

  text-shadow:0 0 30px rgba(201,168,76,0.2)}
.live-tag{display:flex;align-items:center;gap:6px;font-size:.7rem;font-weight:600;letter-spacing:0.15em;color:var(--red)}
.live-dot{width:8px;height:8px;background:var(--red);border-radius:50%;animation:lp 1.4s ease-in-out infinite;
  box-shadow:0 0 8px rgba(248,113,113,0.5)}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.6)}}
.conn-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.conn-dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
.conn-dot.off{background:var(--red);box-shadow:0 0 6px var(--red)}
.hd-right{display:flex;align-items:center;gap:8px}
.nav a{font-size:.78rem;color:var(--text-mid);text-decoration:none;padding:8px 18px;
  border:1px solid transparent;letter-spacing:0.12em;text-transform:uppercase;font-weight:400;transition:all .25s}
.nav a:hover,.nav a.act{color:var(--gold);border-color:rgba(201,168,76,0.35)}
.sfx-btn{cursor:pointer;font-size:.75rem;color:var(--text-dim);display:flex;align-items:center;
  gap:5px;padding:8px 14px;border:1px solid var(--border);background:transparent;font-family:var(--font);
  transition:all .25s;letter-spacing:0.06em}
.sfx-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.sfx-btn.on{color:var(--green);border-color:var(--green-dim)}

/* ═══ TICKER ═══ */
.tk-wrap{overflow:hidden;border-bottom:1px solid var(--border);padding:8px 0;margin-bottom:14px;
  background:linear-gradient(90deg,var(--bg),var(--bg2),var(--bg))}
.tk{display:flex;gap:56px;white-space:nowrap;animation:tkScroll 40s linear infinite;width:max-content}
.tk:hover{animation-play-state:paused}
@keyframes tkScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tk-i{font-size:.88rem;color:var(--text-dim);display:flex;align-items:center;gap:8px;font-weight:300}
.tk-i .s{color:var(--gold);font-weight:600}.tk-i .up{color:var(--green)}.tk-i .dn{color:var(--red)}

/* ═══ METRIC CARDS ═══ */
.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);padding:22px 24px;position:relative;
  overflow:hidden;transition:all .3s}
.card:hover{border-color:var(--border-h);box-shadow:inset 0 0 40px rgba(201,168,76,0.02)}
.card.hero{border-color:rgba(201,168,76,0.25);background:linear-gradient(160deg,var(--bg2),#0f0e18)}
.card.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.card-lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-dim);
  font-weight:500;margin-bottom:10px}
.card-val{font-size:1.7rem;font-weight:700;font-family:var(--mono);letter-spacing:-0.5px;line-height:1.2}
.card-val.up{color:var(--green);text-shadow:0 0 20px rgba(52,211,153,0.15)}
.card-val.dn{color:var(--red);text-shadow:0 0 20px rgba(248,113,113,0.15)}
.card-val.neu{color:var(--text)}
.card-val.gld{color:var(--gold);text-shadow:var(--gold-glow)}
.card-sub{font-size:.75rem;color:var(--text-dim);margin-top:6px;font-weight:300}
.card-val-sm{font-size:1.1rem;font-weight:700;font-family:var(--mono);line-height:1.3}
.card-lbl-line{font-size:.58rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--text-dim);font-weight:500;margin-bottom:2px}

/* ═══ SECTIONS ═══ */
.sec{margin-bottom:18px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 0;
  border-bottom:none;margin-bottom:4px}
.sec-t{font-size:.82rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-mid)}
.sec-t .ct{color:var(--gold);margin-left:10px;font-family:var(--mono)}
.badge{font-size:.62rem;padding:5px 14px;letter-spacing:0.15em;font-weight:500;text-transform:uppercase;
  color:var(--green);border:1px solid var(--green-dim);animation:bPulse 2.5s infinite}
@keyframes bPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px var(--green-dim)}}

/* ═══ TABLES ═══ */
.tw{overflow-x:auto;max-height:460px;overflow-y:auto;border:1px solid var(--border);background:var(--bg2)}
.tw table{width:100%;table-layout:fixed}
.tw th,.tw td{padding:6px 8px;overflow:hidden;text-overflow:ellipsis}
.c-mkt2{width:34%}.c-side2{width:7%;text-align:left}.c-num{width:4%;text-align:right;white-space:nowrap}.c-pnl{width:6%;text-align:right;white-space:nowrap}.c-evt2{width:10%;white-space:nowrap;text-align:center}.c-time{width:4%;white-space:nowrap;color:var(--text-dim);font-size:.65rem;text-align:center}
.c-close{width:9%;text-align:center;white-space:nowrap}
.close-btn{display:inline-block;padding:4px 10px;border-radius:4px;font-size:.75rem;font-weight:700;cursor:pointer;border:none;min-width:70px;transition:opacity .2s}
.close-btn:hover{opacity:.8}
.close-btn.win{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.close-btn.loss{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3)}
tr.glow-win{background:rgba(52,211,153,.04)}
tr.glow-loss{background:rgba(248,113,113,.04)}
@keyframes rowPulseGreen{0%{background:rgba(52,211,153,.04)}30%{background:rgba(52,211,153,.15)}100%{background:rgba(52,211,153,.04)}}
@keyframes rowPulseRed{0%{background:rgba(248,113,113,.04)}30%{background:rgba(248,113,113,.15)}100%{background:rgba(248,113,113,.04)}}
tr.pulse-win{animation:rowPulseGreen 2s ease-out}
tr.pulse-loss{animation:rowPulseRed 2s ease-out}
.live-btn{display:inline-block;padding:3px 10px;border-radius:4px;font-size:.68rem;font-weight:700;cursor:pointer;border:1px solid rgba(248,113,113,.4);background:rgba(248,113,113,.1);color:var(--red);letter-spacing:.08em;transition:all .2s;animation:livePulse 2s infinite}
.live-btn:hover{background:rgba(248,113,113,.25);border-color:var(--red)}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.6}}
th.sort{cursor:pointer;user-select:none}th.sort:hover{color:var(--gold)}th.sort.asc::after{content:' ▲';font-size:.6em}th.sort.desc::after{content:' ▼';font-size:.6em}
.tw::-webkit-scrollbar{width:3px;height:3px}
.tw::-webkit-scrollbar-track{background:var(--bg)}
.tw::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:2}
th{background:var(--bg3);color:var(--text-dim);font-weight:500;text-transform:uppercase;
  letter-spacing:0.14em;font-size:.68rem;padding:8px 8px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:6px 8px;border-bottom:1px solid rgba(30,30,48,0.6);font-weight:300;font-size:.84rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr{transition:background .2s}
tr:hover{background:rgba(201,168,76,0.03)}
.p-up{color:var(--green)}.p-dn{color:var(--red)}
.side{font-weight:600;font-size:.72rem;padding:3px 9px;display:inline-block;letter-spacing:0.06em}
.side.yes{background:rgba(52,211,153,0.08);color:var(--green);border:1px solid rgba(52,211,153,0.2)}
.side.no{background:rgba(248,113,113,0.08);color:var(--red);border:1px solid rgba(248,113,113,0.2)}
.side.oth{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(201,168,76,0.25)}
.c-mkt a,.c-mkt2 a{color:var(--gold);text-decoration:none;transition:opacity .2s}
.c-mkt a:hover{opacity:.7}
.c-tr a{color:var(--text);text-decoration:none;font-weight:500}.c-tr a:hover{color:var(--gold)}
.c-id{color:var(--text-dim);font-family:var(--mono);font-size:.82rem}
.c-dt{color:var(--text-dim);font-size:.82rem}

/* ═══ CHART ═══ */
.chart-box{background:var(--bg2);border:1px solid var(--border);padding:20px;height:260px}
.cp-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:var(--font);
  font-size:.65rem;font-weight:600;letter-spacing:.1em;padding:4px 10px;cursor:pointer;transition:all .2s}
.cp-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.cp-btn.act{background:rgba(201,168,76,0.12);border-color:var(--gold);color:var(--gold)}

/* ═══ TRADER CARDS ═══ */
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.tc{background:var(--bg2);border:1px solid var(--border);padding:24px;transition:all .3s;position:relative}
.tc:hover{border-color:var(--gold-dim);transform:translateY(-2px);box-shadow:var(--gold-glow)}
.tc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.tc.win::before{background:var(--green)}.tc.lose::before{background:var(--red)}
.tc-name{font-size:1rem;font-weight:600;color:var(--gold);letter-spacing:0.06em;margin-bottom:14px}
.tc-name a{color:inherit;text-decoration:none}
.tc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.tc-s{font-size:.82rem;font-weight:300}.tc-s span{color:var(--text-dim)}
.tc-pnl{font-size:1.6rem;font-weight:700;font-family:var(--mono);margin-top:12px}
.tc-det{font-size:.78rem;color:var(--text-dim);margin-top:4px;font-weight:300}
.btn-s{font-size:.7rem;padding:7px 16px;border:1px solid var(--border);background:transparent;
  color:var(--text-dim);cursor:pointer;font-family:var(--font);letter-spacing:0.1em;
  text-transform:uppercase;transition:all .25s;margin-top:14px}
.btn-s:hover{border-color:rgba(248,113,113,0.4);color:var(--red)}

/* ═══ ALERT ═══ */
.al-ov{position:fixed;inset:0;z-index:9999;pointer-events:none;display:flex;
  align-items:flex-start;justify-content:center;padding-top:80px}
.al-ban{pointer-events:auto;background:var(--bg);border:1px solid var(--gold);padding:32px 52px;
  text-align:center;box-shadow:0 0 80px rgba(201,168,76,0.18),0 20px 60px rgba(0,0,0,0.7);
  animation:alIn .35s cubic-bezier(.17,.67,.35,1.2),alOut .5s 5.2s ease-in forwards;
  max-width:620px;width:92%;position:relative}
.al-ban.big-win{animation:alIn .35s cubic-bezier(.17,.67,.35,1.2),alOut .5s 15.5s ease-in forwards}
.al-ban.big-loss{animation:alIn .35s cubic-bezier(.17,.67,.35,1.2),shakeX .4s .35s ease-in-out,alOut .5s 5.5s ease-in forwards}
@keyframes shakeX{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-5px)}60%{transform:translateX(5px)}75%{transform:translateX(-2px)}90%{transform:translateX(2px)}}
.al-ban::before{content:'';position:absolute;inset:-1px;
  background:linear-gradient(45deg,var(--gold),transparent,var(--gold));opacity:.15;z-index:-1;
  animation:borderShift 3s linear infinite}
@keyframes borderShift{to{filter:hue-rotate(20deg)}}
@keyframes alIn{from{transform:translateY(-30px)scale(.95);opacity:0}to{transform:none;opacity:1}}
@keyframes alOut{to{transform:translateY(-15px);opacity:0}}
.al-lbl{font-size:.72rem;letter-spacing:0.35em;color:var(--gold);text-transform:uppercase;
  margin-bottom:10px;font-weight:600;animation:flk .1s 5}
@keyframes flk{0%,100%{opacity:1}50%{opacity:.15}}
.al-ttl{font-size:1.15rem;font-weight:600;color:var(--text);margin-bottom:6px}
.al-det{font-size:.88rem;color:var(--text-mid);font-weight:300}
.al-det .hl{color:var(--gold);font-weight:600}

/* ═══ BIG WIN JACKPOT ═══ */
#bigWinCanvas{position:fixed;inset:0;z-index:10001;pointer-events:none}
.bw-ov{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0);pointer-events:none;transition:background .6s ease}
.bw-ov.active{background:rgba(0,0,0,0.8);pointer-events:auto}
.bw-ov.fade-out{background:rgba(0,0,0,0);transition:background .8s ease}
.bw-card{text-align:center;transform:scale(0);opacity:0;transition:transform .5s cubic-bezier(.17,.67,.35,1.5),opacity .4s ease;
  position:relative;z-index:2}
.bw-ov.active .bw-card{transform:scale(1);opacity:1}
.bw-ov.fade-out .bw-card{transform:scale(0.8);opacity:0;transition:transform .6s ease,opacity .6s ease}
.bw-rays{position:absolute;width:600px;height:600px;left:50%;top:50%;margin:-300px 0 0 -300px;
  background:conic-gradient(from 0deg,transparent,rgba(201,168,76,0.1) 10%,transparent 20%);
  border-radius:50%;animation:bwSpin 8s linear infinite;z-index:1}
@keyframes bwSpin{to{transform:rotate(360deg)}}
.bw-title{font-size:3.2rem;font-weight:900;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--gold);text-shadow:0 0 40px rgba(201,168,76,0.6),0 0 80px rgba(201,168,76,0.3),
  0 4px 20px rgba(0,0,0,0.8);animation:bwPulse 1.2s ease-in-out infinite alternate;
  font-family:var(--font)}
@keyframes bwPulse{from{text-shadow:0 0 40px rgba(201,168,76,0.6),0 0 80px rgba(201,168,76,0.3),0 4px 20px rgba(0,0,0,0.8);transform:scale(1)}
  to{text-shadow:0 0 60px rgba(201,168,76,0.9),0 0 120px rgba(201,168,76,0.5),0 4px 20px rgba(0,0,0,0.8);transform:scale(1.05)}}
.bw-gif{width:420px;max-width:85vw;border-radius:12px;margin:16px auto;display:block;
  box-shadow:0 0 60px rgba(201,168,76,0.3)}
.bw-pnl{font-size:4rem;font-weight:700;font-family:var(--mono);color:var(--green);
  text-shadow:0 0 30px rgba(52,211,153,0.5);margin:8px 0}
.bw-market{font-size:1.1rem;font-weight:500;color:var(--text);max-width:500px;margin:0 auto}
.bw-detail{font-size:.9rem;color:var(--text-mid);font-weight:300;margin-top:6px;letter-spacing:0.05em}
.bw-detail .hl{color:var(--gold);font-weight:600}
@media(max-width:600px){
  .bw-title{font-size:2rem;letter-spacing:0.1em}
  .bw-pnl{font-size:2.5rem}
  .bw-rays{width:300px;height:300px;margin:-150px 0 0 -150px}
  .bw-gif{width:280px}
}

/* ═══ MEME GIF OVERLAY (bottom-right) ═══ */
.meme-ov{position:fixed;inset:0;z-index:9997;pointer-events:none;display:flex;
  align-items:flex-end;justify-content:flex-end;padding:0 32px 32px 0}
.meme-card{pointer-events:auto;background:var(--bg);border:1px solid var(--border-h);
  padding:14px 18px;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,0.7);
  animation:memeIn .35s cubic-bezier(.17,.67,.35,1.2);max-width:340px;text-align:center}
.meme-card.out{animation:memeOut .4s ease-in forwards}
.meme-card img{width:260px;border-radius:8px;margin-bottom:8px}
.meme-lbl{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;font-weight:700;
  color:var(--gold);margin-bottom:2px}
.meme-sub{font-size:.68rem;color:var(--text-dim);font-weight:300;font-style:italic}
@keyframes memeIn{from{transform:translateY(30px) scale(.95);opacity:0}to{transform:none;opacity:1}}
@keyframes memeOut{to{transform:translateY(15px);opacity:0}}

/* ═══ EMPTY ═══ */
.empty{text-align:center;padding:52px;color:var(--text-dim);font-size:1.05rem;font-weight:300;
  border:1px dashed var(--border);background:var(--bg2)}

/* ═══ FADE ═══ */
.fi{animation:fu .6s ease-out both}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}

/* ═══ CLI ACTIVITY LOG ═══ */
.cli-panel{max-height:300px;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);
  font-family:var(--mono);font-size:.8rem;padding:6px 0}
.cli-panel::-webkit-scrollbar{width:3px}
.cli-panel::-webkit-scrollbar-track{background:#08080e}
.cli-panel::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
.cl{display:flex;gap:0;padding:3px 16px;line-height:1.7;align-items:baseline;transition:background .15s}
.cl:hover{background:rgba(201,168,76,0.03)}
.cl-t{color:#8a8a9a;min-width:52px;font-size:.72rem}
.cl-p{min-width:14px;margin-right:6px}
.cl-p.g{color:var(--green)}.cl-p.r{color:var(--red)}.cl-p.y{color:var(--gold)}.cl-p.b{color:#38bdf8}.cl-p.d{color:#4a4a5a}
.cl-msg{color:#9a98aa;flex:1;min-width:0}
.cl-msg b{color:var(--text);font-weight:500}
.cl-msg .hl-g{color:var(--green)}.cl-msg .hl-r{color:var(--red)}.cl-msg .hl-y{color:var(--gold)}.cl-msg .hl-b{color:#38bdf8}
.cl-pnl{min-width:70px;text-align:right;font-weight:500;font-size:.8rem}
@keyframes clIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.cl-new{animation:clIn .3s ease-out}

/* ═══ RESPONSIVE ═══ */
@media(max-width:960px){.cards{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:782px){
  .cards{grid-template-columns:repeat(2,1fr);gap:10px}
  .hd{flex-direction:column;align-items:flex-start}
  .tg{grid-template-columns:1fr}
  .card{padding:18px}.card-val{font-size:1.3rem}
  .tw{max-height:320px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tw table{table-layout:auto;min-width:0}
  .tw th,.tw td{font-size:.75rem;padding:6px 5px}
  .app{padding:0 10px 40px}
}
@media(max-width:480px){.cards{grid-template-columns:1fr 1fr;gap:8px}.card-val{font-size:1.1rem}
  .tw table{min-width:0}
  .tw th,.tw td{font-size:.7rem;padding:5px 4px}
  td{font-size:.72rem;padding:6px 4px}
}
@keyframes logoFloat{0%{background-position:40% center}50%{background-position:60% center}100%{background-position:40% center}}

/* === SSC Mini Sauna === */
.sauna-scene{display:none;height:42px;position:relative;margin-right:24px;font-size:10px;user-select:none}
.wide .sauna-scene{display:flex;align-items:end;gap:10px}
.s-table{position:relative;width:34px;height:20px;background:#3d2b1a;border-radius:3px 3px 0 0;border:1px solid #5a3d20;border-bottom:none;display:flex;align-items:center;justify-content:center;z-index:2}
.s-table::after{content:'';position:absolute;bottom:0;width:34px;height:2px;background:#5a3d20}
.s-beers{display:flex;gap:1px;position:relative;z-index:1}
.s-beer{font-size:7px;animation:s-sip 3s ease-in-out infinite}
.s-beer:nth-child(2){animation-delay:.5s}.s-beer:nth-child(3){animation-delay:1s}
@keyframes s-sip{0%,100%{transform:translateY(0)}30%{transform:translateY(-2px) rotate(-8deg)}60%{transform:translateY(0)}}
.s-guys{display:flex;position:absolute;bottom:20px;left:2px;z-index:5}
.s-guy{font-size:9px;position:relative}
.s-pool{width:22px;height:14px;background:linear-gradient(180deg,#2196F3,#0d47a1 60%,#0a3d8f);border-radius:3px;border:1px solid #42a5f5;position:relative;align-self:flex-end;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,0.3),0 0 4px rgba(33,150,243,0.3)}
.s-pool::before{content:'~~~';position:absolute;top:2px;left:1px;font-size:5px;color:rgba(255,255,255,0.4);animation:s-wave 1.5s ease-in-out infinite}
.s-pool::after{content:'~~';position:absolute;top:7px;left:3px;font-size:4px;color:rgba(255,255,255,0.25);animation:s-wave 1.5s ease-in-out infinite;animation-delay:.7s}
@keyframes s-wave{0%,100%{transform:translateY(0)}50%{transform:translateY(1px)}}
.s-pool.splash{box-shadow:inset 0 2px 4px rgba(0,0,0,0.3),0 0 8px rgba(33,150,243,0.6);border-color:#64b5f6}
.s-cabin{width:26px;height:30px;background:linear-gradient(180deg,#6b4c30 0%,#4a3525 40%,#3d2b1a);border-radius:3px 3px 0 0;border:1px solid #8b6914;position:relative;overflow:visible;box-shadow:0 0 6px rgba(201,168,76,0.15);z-index:2}
.s-cabin::before{content:'';position:absolute;top:-1px;left:-2px;right:-2px;height:7px;background:linear-gradient(180deg,#8b6914,#6b4c30);border-radius:4px 4px 0 0;border:1px solid #a07c1c;border-bottom:none}
.s-door{position:absolute;bottom:0;left:5px;width:16px;height:16px;background:#2a1d10;border-radius:3px 3px 0 0;border:1px solid #5a3d20;border-bottom:none;transition:all 0.3s}
.s-door::after{content:'';position:absolute;right:2px;top:5px;width:2px;height:4px;background:#c9a84c;border-radius:1px;transition:opacity 0.3s}
.s-door.open{background:#0d0804;border-color:#3d2b1a}
.s-door.open::after{opacity:0}
.s-steam{position:absolute;top:-8px;left:50%;display:none;z-index:4}
.s-steam.active{display:block}
.s-steam span{position:absolute;font-size:8px;opacity:0;animation:s-rise 2s ease-out infinite}
.s-steam span:nth-child(1){left:-5px;animation-delay:0s}
.s-steam span:nth-child(2){left:2px;animation-delay:.5s}
.s-steam span:nth-child(3){left:-1px;animation-delay:1s}
@keyframes s-rise{0%{opacity:.8;transform:translateY(0)}100%{opacity:0;transform:translateY(-12px)}}
.s-door-steam{position:absolute;bottom:18px;left:6px;display:none;z-index:4}
.s-door-steam.active{display:flex;gap:1px}
.s-door-steam span{font-size:5px;opacity:0;animation:s-puff 1.2s ease-out infinite}
.s-door-steam span:nth-child(2){animation-delay:.3s}
.s-door-steam span:nth-child(3){animation-delay:.6s}
